services:
  app:
    build: .
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - ./history:/app/history
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface

  build-index:
    build: .
    env_file: .env
    command: python -m rag.build_index
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface

  test:
    build: .
    command: python -m pytest tests/ -v

volumes:
  hf_cache: